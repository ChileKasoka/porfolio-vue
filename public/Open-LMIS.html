<div class="login-container ng-scope">
    <div class="modal-login-header">
        <h1 openlmis-message="label.app.header">Electronic Logistics Management Information Systems</h1>
        <!-- ngInclude: undefined --><ng-include src="&#39;/public/pages/locale-list.html&#39;" class="ng-scope"><!--
  ~ This program is part of the OpenLMIS logistics management information system platform software.

  -->

<div class="ng-scope">
  <div class="locale-container ng-scope" ng-controller="LocaleController">
    <ul>
      <!-- ngRepeat: code in locales --><li ng-repeat="code in locales" class="ng-scope">
        <a id="locale_pt" ng-class="{&#39;selected&#39;: selectedLocale == code}" ng-click="changeLocale(code)" openlmis-message="label.locale.pt" href="https://zm-elmis.org/public/pages/login.html">português</a>
        <span>|</span>
      </li><!-- end ngRepeat: code in locales --><li ng-repeat="code in locales" class="ng-scope">
        <a id="locale_en" ng-class="{&#39;selected&#39;: selectedLocale == code}" ng-click="changeLocale(code)" openlmis-message="label.locale.en" href="https://zm-elmis.org/public/pages/login.html" class="selected">English</a>
        <span>|</span>
      </li><!-- end ngRepeat: code in locales --><li ng-repeat="code in locales" class="ng-scope">
        <a id="locale_es" ng-class="{&#39;selected&#39;: selectedLocale == code}" ng-click="changeLocale(code)" openlmis-message="label.locale.es" href="https://zm-elmis.org/public/pages/login.html">español</a>
        <span>|</span>
      </li><!-- end ngRepeat: code in locales -->
    </ul>
  </div>
</div></ng-include></div>

    <div class="login-form ng-scope" ng-controller="LoginController">
        <h2 id="signInLabel" openlmis-message="label.sign.in">Sign In</h2>

        <form ng-submit="doLogin()" novalidate="" class="ng-dirty ng-valid ng-valid-required">
            <fieldset>
                <div class="login-form-row">
                    <input ng-model="username" type="text" id="username" openlmis-message="placeholder.username" required="" autofocus="" class="ng-dirty ng-valid ng-valid-required" placeholder="Username">
                </div>
                <div class="login-form-row">
                    <input ng-model="password" type="password" id="password" openlmis-message="placeholder.password" required="" class="ng-dirty ng-valid ng-valid-required" placeholder="Password">
                </div>
                <div id="loginError" class="alert alert-error ng-binding ng-hide" ng-bind="loginError" ng-show="loginError"></div>
                <div class="login-form-row">
                    <input class="btn btn-primary" type="submit" openlmis-message="button.sign.in" ng-disabled="disableSignInButton" value="Sign in">
                </div>
                <div class="login-form-row forgot-link">
                    <a id="forgotPasswordLink" href="https://zm-elmis.org/public/pages/login.html" ng-click="goToForgotPassword()" openlmis-message="link.forgot.password">Forgot password?</a>
                </div>
            </fieldset>
        </form>
    </div>
</div>

</ng-include></div>

</body></html>
